services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishguard-backend
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - WATCHFILES_FORCE_COLORS=true
    networks:
      - phishguard-network

networks:
  phishguard-network:
    driver: bridge
